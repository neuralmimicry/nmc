name: Initialise Wiki

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/init-wiki.yml'

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push wiki Home page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          WIKI_DIR="$(mktemp -d)"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" "$WIKI_DIR" 2>/dev/null || true
          cd "$WIKI_DIR"
          [ -d .git ] || { git init -b master; git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"; }
          cat > Home.md << 'WIKIEOF'
# NeuralMimicry Continuum (NMC) — Wiki Home

**NMC** is the `release` and `operate` control plane for the NeuralMimicry platform. It ships two C++ binaries — `nmc` (operator CLI) and `nmc_server` (HTTP control plane) — covering Kubernetes/vcluster management, Tracey fleet telemetry, VM and node operations, and provider portal orchestration.

