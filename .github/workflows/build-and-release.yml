name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub release from the selected v* tag ref"
        required: true
        type: boolean
        default: false
      draft_release:
        description: "Mark a manually published release as draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark a manually published release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  contract-test:
    name: Contract Tests (Routes + Command Coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run API route contract test
        run: python3 tests/contracts/api_route_contract_test.py

      - name: Run command coverage contract test
        run: python3 tests/contracts/command_coverage_contract_test.py

  safety-test:
    name: Safety Test (Server Guard/Redaction)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run server safety contract test
        run: python3 tests/contracts/server_safety_contract_test.py

  functional-test:
    name: Functional Test (CLI Mock Integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install client build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure client build for functional tests
        run: cmake -S nmc_client -B nmc_client/build -DCMAKE_BUILD_TYPE=Release

      - name: Build client for functional tests
        run: cmake --build nmc_client/build --config Release -- -j"$(nproc)"

      - name: Run functional CLI integration test
        run: python3 tests/functional/client_cli_integration_test.py

  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    needs:
      - contract-test
      - safety-test
      - functional-test
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    outputs:
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          source_version=$(tr -d '[:space:]' < VERSION)
          short_sha="${GITHUB_SHA::0:7}"
          release_tag=""

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            artifact_version="${release_tag#v}"
          else
            artifact_version="${source_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          if [[ -n "$release_tag" && "$artifact_version" != "$source_version" ]]; then
            echo "::error::Tag ${release_tag} does not match VERSION"
            echo "::error::version ${source_version}"
            exit 1
          fi

          echo "artifact_version=$artifact_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  package-client-linux:
    name: Package Client (Linux x64)
    runs-on: ubuntu-latest
    needs: release-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure
        run: >-
          cmake -S nmc_client -B nmc_client/build -DCMAKE_BUILD_TYPE=Release
          -DNMC_CLIENT_VERSION=${{ needs.release-metadata.outputs.artifact_version }}

      - name: Build
        run: cmake --build nmc_client/build --config Release -- -j"$(nproc)"

      - name: Smoke test
        run: ./nmc_client/build/nmc version --no-check

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh \
            --component client \
            --version "${{ needs.release-metadata.outputs.artifact_version }}" \
            --input ./nmc_client/build/nmc \
            --platform linux-x86_64 \
            --rename nmc \
            --output-dir ./dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nmc-client-linux-x86_64
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  package-client-windows:
    name: Package Client (Windows x64)
    runs-on: windows-latest
    needs: release-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: >-
          cmake -S nmc_client -B nmc_client/build -DCMAKE_BUILD_TYPE=Release
          -DNMC_CLIENT_VERSION=${{ needs.release-metadata.outputs.artifact_version }}

      - name: Build
        run: cmake --build nmc_client/build --config Release

      - name: Smoke test
        shell: pwsh
        run: .\nmc_client\build\Release\nmc.exe version --no-check

      - name: Package
        shell: pwsh
        run: |
          .\scripts\package-release.ps1 `
            -Component client `
            -Version "${{ needs.release-metadata.outputs.artifact_version }}" `
            -Input .\nmc_client\build\Release\nmc.exe `
            -Platform windows-x86_64 `
            -Rename nmc.exe `
            -OutputDir .\dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nmc-client-windows-x86_64
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  package-client-macos:
    name: Package Client (macOS)
    runs-on: macos-latest
    needs: release-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: >-
          cmake -S nmc_client -B nmc_client/build -DCMAKE_BUILD_TYPE=Release
          -DNMC_CLIENT_VERSION=${{ needs.release-metadata.outputs.artifact_version }}

      - name: Build
        run: cmake --build nmc_client/build --config Release -- -j"$(sysctl -n hw.ncpu)"

      - name: Smoke test
        run: ./nmc_client/build/nmc version --no-check

      - name: Detect platform
        id: platform
        shell: bash
        run: |
          set -euo pipefail
          arch=$(uname -m)
          case "$arch" in
            arm64) arch="aarch64" ;;
          esac
          echo "value=macos-${arch}" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh \
            --component client \
            --version "${{ needs.release-metadata.outputs.artifact_version }}" \
            --input ./nmc_client/build/nmc \
            --platform "${{ steps.platform.outputs.value }}" \
            --rename nmc \
            --output-dir ./dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nmc-client-macos
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  package-server-linux:
    name: Package Server (Linux x64)
    runs-on: ubuntu-latest
    needs: release-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config libssl-dev libspdlog-dev \
            libwebsockets-dev libcurl4-openssl-dev autoconf automake libtool \
            ca-certificates curl gawk

      - name: Configure
        run: >-
          cmake -S nmc_server -B nmc_server/build -DCMAKE_BUILD_TYPE=Release
          -DNMC_SERVER_VERSION=${{ needs.release-metadata.outputs.artifact_version }}

      - name: Build
        run: cmake --build nmc_server/build --config Release -- -j"$(nproc)"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh \
            --component server \
            --version "${{ needs.release-metadata.outputs.artifact_version }}" \
            --input ./nmc_server/build/nmc_server \
            --platform linux-x86_64 \
            --rename nmc_server \
            --output-dir ./dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nmc-server-linux-x86_64
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - release-metadata
      - package-client-linux
      - package-client-windows
      - package-client-macos
      - package-server-linux
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write

    steps:
      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.release-metadata.outputs.release_tag }}" ]]; then
            echo "::error::Publishing requires a v* tag ref"
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
          DRAFT_RELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.draft_release }}
          MANUAL_PRERELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(release-assets/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No packaged artifacts were downloaded"
            exit 1
          fi

          title="NMC ${RELEASE_TAG}"
          prerelease="${MANUAL_PRERELEASE}"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && "${RELEASE_TAG}" == *-* ]]; then
            prerelease="true"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
            exit 0
          fi

          args=(
            "${RELEASE_TAG}"
            "${files[@]}"
            --target "${GITHUB_SHA}"
            --title "${title}"
            --generate-notes
          )

          if [[ "${DRAFT_RELEASE}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
