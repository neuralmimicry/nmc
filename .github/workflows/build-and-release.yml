name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-client-linux:
    name: Build Client (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=0.0.1-main.${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure
        run: cmake -S nmc_client -B nmc_client/build -DCMAKE_BUILD_TYPE=Release -DNMC_CLIENT_VERSION=${{ steps.version.outputs.value }}

      - name: Build
        run: cmake --build nmc_client/build --config Release -- -j"$(nproc)"

      - name: Smoke test
        run: ./nmc_client/build/nmc version --no-check

      - name: Package
        run: |
          mkdir -p dist
          cp nmc_client/build/nmc dist/nmc-client-linux-x64
          tar -C dist -czf nmc-client-linux-x64.tar.gz nmc-client-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nmc-client-linux-x64
          path: nmc-client-linux-x64.tar.gz
          retention-days: 7

  build-client-windows:
    name: Build Client (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute build version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}".Substring(1)
          } else {
            $version = "0.0.1-main.${{ github.run_number }}"
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure
        run: cmake -S nmc_client -B nmc_client/build -DCMAKE_BUILD_TYPE=Release -DNMC_CLIENT_VERSION=${{ steps.version.outputs.value }}

      - name: Build
        run: cmake --build nmc_client/build --config Release

      - name: Smoke test
        shell: pwsh
        run: .\nmc_client\build\Release\nmc.exe version --no-check

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item .\nmc_client\build\Release\nmc.exe .\dist\nmc-client-windows-x64.exe
          Compress-Archive -Path .\dist\nmc-client-windows-x64.exe -DestinationPath .\nmc-client-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nmc-client-windows-x64
          path: nmc-client-windows-x64.zip
          retention-days: 7

  build-server-linux:
    name: Build Server (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=0.0.1-main.${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config libssl-dev libspdlog-dev \
            libwebsockets-dev libcurl4-openssl-dev autoconf automake libtool \
            ca-certificates curl gawk

      - name: Configure
        run: cmake -S nmc_server -B nmc_server/build -DCMAKE_BUILD_TYPE=Release -DNMC_SERVER_VERSION=${{ steps.version.outputs.value }}

      - name: Build
        run: cmake --build nmc_server/build --config Release -- -j"$(nproc)"

      - name: Package
        run: |
          mkdir -p dist
          cp nmc_server/build/nmc_server dist/nmc-server-linux-x64
          tar -C dist -czf nmc-server-linux-x64.tar.gz nmc-server-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nmc-server-linux-x64
          path: nmc-server-linux-x64.tar.gz
          retention-days: 7

  release-snapshot:
    name: Publish Snapshot Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-client-linux
      - build-client-windows
      - build-server-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish snapshot
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ASSET_CLIENT_LINUX="release-assets/nmc-client-linux-x64.tar.gz"
          ASSET_CLIENT_WINDOWS="release-assets/nmc-client-windows-x64.zip"
          ASSET_SERVER_LINUX="release-assets/nmc-server-linux-x64.tar.gz"
          TAG="snapshot-main"
          TITLE="Snapshot build (main)"

          for asset in "$ASSET_CLIENT_LINUX" "$ASSET_CLIENT_WINDOWS" "$ASSET_SERVER_LINUX"; do
            if [[ ! -f "$asset" ]]; then
              echo "Missing release asset: $asset" >&2
              exit 1
            fi
          done

          NOTES_FILE="$(mktemp)"
          {
            echo "Automated snapshot release from main."
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > "$NOTES_FILE"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --target "${GITHUB_SHA}" \
              --prerelease \
              --notes-file "$NOTES_FILE"
            gh release upload "$TAG" \
              "$ASSET_CLIENT_LINUX" \
              "$ASSET_CLIENT_WINDOWS" \
              "$ASSET_SERVER_LINUX" \
              --clobber
          else
            gh release create "$TAG" \
              "$ASSET_CLIENT_LINUX" \
              "$ASSET_CLIENT_WINDOWS" \
              "$ASSET_SERVER_LINUX" \
              --title "$TITLE" \
              --target "${GITHUB_SHA}" \
              --prerelease \
              --latest=false \
              --notes-file "$NOTES_FILE"
          fi

  release-tag:
    name: Publish Tagged Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-client-linux
      - build-client-windows
      - build-server-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ASSET_CLIENT_LINUX="release-assets/nmc-client-linux-x64.tar.gz"
          ASSET_CLIENT_WINDOWS="release-assets/nmc-client-windows-x64.zip"
          ASSET_SERVER_LINUX="release-assets/nmc-server-linux-x64.tar.gz"
          TAG="${GITHUB_REF_NAME}"
          TITLE="NMC ${GITHUB_REF_NAME}"

          for asset in "$ASSET_CLIENT_LINUX" "$ASSET_CLIENT_WINDOWS" "$ASSET_SERVER_LINUX"; do
            if [[ ! -f "$asset" ]]; then
              echo "Missing release asset: $asset" >&2
              exit 1
            fi
          done

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --latest
            gh release upload "$TAG" \
              "$ASSET_CLIENT_LINUX" \
              "$ASSET_CLIENT_WINDOWS" \
              "$ASSET_SERVER_LINUX" \
              --clobber
          else
            gh release create "$TAG" \
              "$ASSET_CLIENT_LINUX" \
              "$ASSET_CLIENT_WINDOWS" \
              "$ASSET_SERVER_LINUX" \
              --title "$TITLE" \
              --latest \
              --generate-notes \
              --verify-tag
          fi
